<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sky Tribe — Interactive Build Viewer</title>
<style>

  .fade{animation:fu .8s ease both}
  @keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(46, innerWidth/innerHeight, 5, 40000);
camera.position.set(2900, 1500, 3400);
// preserveDrawingBuffer so the 2D compositor can drawImage() the rendered frame
// (without it the GL buffer is already cleared and the composite comes out black)
const renderer = new THREE.WebGLRenderer({antialias:true, preserveDrawingBuffer:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
// film response instead of raw linear light — this is most of why CG "looks CG"
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;
document.body.appendChild(renderer.domElement);

// IMAGE-BASED LIGHTING: real surfaces need something to REFLECT. Without an
// environment, carbon and glass have nothing to mirror and read as flat plastic.
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
// dusk-sky gradient backdrop (also what the canopy and carbon reflect)
{const c=document.createElement('canvas');c.width=2;c.height=256;const g=c.getContext('2d');
 const grd=g.createLinearGradient(0,0,0,256);
 grd.addColorStop(0,'#12233d'); grd.addColorStop(.55,'#0d1626'); grd.addColorStop(1,'#05080e');

scene.fog = new THREE.Fog(0x0b1220, 7000, 22000);
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(150, 550, 0);
controls.autoRotate = false; controls.autoRotateSpeed = 0.9;

// three-point lighting: warm low sun key, cool sky fill, hard rim to draw the silhouette
scene.add(new THREE.HemisphereLight(0x9fc4ff, 0x121a26, 0.5));
const key = new THREE.DirectionalLight(0xffd9b0, 3.2);
key.position.set(2600, 3000, 1800); key.castShadow = true;
key.shadow.mapSize.set(4096,4096); key.shadow.camera.far = 14000;
key.shadow.camera.left=-3400;key.shadow.camera.right=3400;key.shadow.camera.top=3400;key.shadow.camera.bottom=-3400;
key.shadow.bias=-0.0006; key.shadow.normalBias=12; key.shadow.radius=4;
scene.add(key);
const fill = new THREE.DirectionalLight(0x6f9cff, 0.85); fill.position.set(-2600,1400,-1200); scene.add(fill);
const rim  = new THREE.DirectionalLight(0xbfe6ff, 2.2);  rim.position.set(-1800,900,-2600);  scene.add(rim);

const ground = new THREE.Mesh(new THREE.CircleGeometry(9000,96),
  new THREE.MeshStandardMaterial({color:0x0e1420, roughness:0.72, metalness:0.05, envMapIntensity:0.5}));
ground.rotation.x = -Math.PI/2; ground.position.y = -560; ground.receiveShadow = true; scene.add(ground);
const grid = new THREE.GridHelper(14000,56,0x24365a,0x151f34); grid.position.y=-559;
grid.material.transparent=true; grid.material.opacity=.35; scene.add(grid);

// WATER (buoyancy): all-up ~241 kg (156 empty + 85 pilot) displaces ~241 L.
// Sealed hull holds ~650 L, so it floats with only the bottom ~20 cm of
// belly submerged (~2.7x reserve buoyancy). Waterline sits ~at the base of
// the cockpit coaming — cabin, seat, pilot all stay dry.
const WL = 55; // model mm — computed waterline height
const waterGrp = new THREE.Group(); scene.add(waterGrp);
const water = new THREE.Mesh(new THREE.CircleGeometry(9000,64),
  new THREE.MeshPhysicalMaterial({color:0x1c6ea0, transparent:true, opacity:.6, roughness:.12, metalness:0, side:THREE.DoubleSide}));
water.rotation.x = -Math.PI/2; water.position.y = WL; waterGrp.add(water);
// bright ring marking exactly where the waterline crosses the hull
const wlRing = new THREE.Mesh(new THREE.TorusGeometry(1500,16,8,64), new THREE.MeshBasicMaterial({color:0x7fe9ff}));
wlRing.rotation.x = -Math.PI/2; wlRing.position.y = WL+2; waterGrp.add(wlRing);
waterGrp.visible = false;

// MATERIALS — physically plausible, not "shiny grey".
// Carbon fibre is NOT a metal: metalness ~0 + a clearcoat lacquer on top. That
// clearcoat is what gives real carbon its wet, deep look. A woven normal map
// (generated below) gives the twill its texture instead of a flat surface.
function weaveMap(px=512, tile=16){
  const c=document.createElement('canvas'); c.width=c.height=px; const g=c.getContext('2d');
  g.fillStyle='#8080ff'; g.fillRect(0,0,px,px);              // flat normal
  const s=px/tile;
  for(let y=0;y<tile;y++)for(let x=0;x<tile;x++){
    const over=(x+y)%2===0;                                   // 2x2 twill over/under
    const grd=g.createLinearGradient(x*s,y*s, over?(x+1)*s:x*s, over?y*s:(y+1)*s);
    grd.addColorStop(0,'#6f6fff'); grd.addColorStop(.5,'#8080ff'); grd.addColorStop(1,'#9191ff');
    g.fillStyle=grd; g.fillRect(x*s,y*s,s,s);
  }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(6,6); return t;
}
const WEAVE = weaveMap();
const M = {
  carbon: new THREE.MeshPhysicalMaterial({color:0x15171c, metalness:.05, roughness:.34,
            clearcoat:1, clearcoatRoughness:.06, normalMap:WEAVE, normalScale:new THREE.Vector2(.35,.35), envMapIntensity:1.1}),
  shell:  new THREE.MeshPhysicalMaterial({color:0x525b68, metalness:.12, roughness:.22,
            clearcoat:1, clearcoatRoughness:.05, envMapIntensity:1.3, side:THREE.DoubleSide}),
  carbonL:new THREE.MeshPhysicalMaterial({color:0x23262d, metalness:.05, roughness:.42,
            clearcoat:.8, clearcoatRoughness:.12, normalMap:WEAVE, normalScale:new THREE.Vector2(.25,.25), envMapIntensity:1}),
  silver: new THREE.MeshStandardMaterial({color:0xb9c2ce, metalness:1, roughness:.22, envMapIntensity:1.4}),
  gold:   new THREE.MeshStandardMaterial({color:0xd8b24a, metalness:1, roughness:.24, envMapIntensity:1.4}),
  blade:  new THREE.MeshPhysicalMaterial({color:0x0d0f13, metalness:.05, roughness:.3,
            clearcoat:1, clearcoatRoughness:.08, envMapIntensity:1.2}),
  disc:   new THREE.MeshBasicMaterial({color:0x7fc4ff, transparent:true, opacity:.055, side:THREE.DoubleSide, depthWrite:false}),
  batt:   new THREE.MeshPhysicalMaterial({color:0x2b2f36, metalness:.35, roughness:.5, clearcoat:.3, envMapIntensity:.9}),
  green:  new THREE.MeshStandardMaterial({color:0x39c46f, roughness:.45, metalness:.2, emissive:0x0d3a1a, emissiveIntensity:.8}),
  seat:   new THREE.MeshPhysicalMaterial({color:0x121419, roughness:.78, metalness:.02, sheen:.6, sheenColor:new THREE.Color(0x30405a)}),
  // real glass: light passes THROUGH it (transmission), it doesn't just fade out
  glass:  new THREE.MeshPhysicalMaterial({color:0xdff2ff, transmission:.94, thickness:14, ior:1.5,
            roughness:.045, metalness:0, clearcoat:1, clearcoatRoughness:.03,
            transparent:true, opacity:1, envMapIntensity:1.6, side:THREE.DoubleSide}),
  screen: new THREE.MeshStandardMaterial({color:0x07202f, emissive:0x2183cc, emissiveIntensity:1.1, roughness:.15}),
  red:    new THREE.MeshPhysicalMaterial({color:0xd63a4f, roughness:.35, clearcoat:1, clearcoatRoughness:.1}),
  strap:  new THREE.MeshStandardMaterial({color:0x8f1a1a, roughness:.85, metalness:0}),
  pilot:  new THREE.MeshStandardMaterial({color:0x5b7fb0, roughness:.6, transparent:true, opacity:.5}),
};

function tube(p1,p2,r,mat){
  const d=new THREE.Vector3().subVectors(p2,p1), L=d.length();
  const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,L,20),mat);
  m.position.copy(p1).addScaledVector(d,.5);
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),d.clone().normalize());
  m.castShadow=true; return m;
}
// spline-smooth a short station list into a dense one so the loft has no kinks
function smoothStations(st, n=28){
  const A=new THREE.CatmullRomCurve3(st.map(s=>new THREE.Vector3(s.x,s.cy,0)));
  const B=new THREE.CatmullRomCurve3(st.map(s=>new THREE.Vector3(s.w,s.h,0)));
  const out=[];
  for(let i=0;i<=n;i++){const t=i/n,a=A.getPoint(t),b=B.getPoint(t);
    out.push({x:a.x,cy:a.y,w:Math.max(20,b.x),h:Math.max(20,b.y)});}
  return out;
}
// COCKPIT SILL — one constant world height (2026-07-16, Matt: "make that fuselage
// straight across on the sides").
// The old cut was by ANGLE (skip faces where sin(a) > 0.50), which made the sill
// follow the ellipse and climb to y=770 at the widest station — 42mm ABOVE the
// pilot's 728mm eye line. The pilot was looking at the inside of the hull. Cutting
// at a constant Y instead gives a straight, level coaming line AND real visibility:
// eye sits 128mm above the sill, just under shoulder height, like a real cockpit.
const SILL_Y = 600;
const OPEN_FROM = -700, OPEN_TO = 680;

// SUPERELLIPSE CROSS-SECTION (2026-07-16 — Matt: "smooth it out").
// Every station used to be a pure ellipse, which is exactly what made the body read
// as a blob with a bubble stuck on top: an ellipse pinches to nothing at the keel and
// bulges hardest at mid-height. Real fuselages and hulls use a flatter-sided section.
// SE=3 keeps the same overall envelope but flattens the belly and the sides, so the
// body has a waterline, the canopy grows out of a wide shoulder instead of perching on
// a curve, and there is usable width down by the keel where the battery lives.
const SE = 3.0;
const seY = a => Math.sign(Math.sin(a))*Math.pow(Math.abs(Math.sin(a)), 2/SE);
const seZ = a => Math.sign(Math.cos(a))*Math.pow(Math.abs(Math.cos(a)), 2/SE);
// half-width of a station at a given world height — the check that matters for fit
function halfWidthAt(st, y){
  const t=(y-st.cy)/st.h; if(Math.abs(t)>1) return 0;
  const sinA=Math.sign(t)*Math.pow(Math.abs(t), SE/2);
  return st.w*Math.pow(Math.sqrt(Math.max(0,1-sinA*sinA)), 2/SE);
}

// loft ONE smooth continuous fuselage from a set of cross-section stations
function loftHull(stations, mat, openFrom, openTo){
  stations=smoothStations(stations);
  const M=72, verts=[], idx=[];
  const rings=stations.map(s=>{const r=[];for(let i=0;i<M;i++){const a=Math.PI*2*i/M;r.push([s.x, s.cy+s.h*seY(a), s.w*seZ(a)]);}return r;});
  rings.forEach(r=>r.forEach(p=>verts.push(p[0],p[1],p[2])));
  for(let s=0;s<rings.length-1;s++)for(let i=0;i<M;i++){
    const xMid=(stations[s].x+stations[s+1].x)/2, ang=Math.PI*2*i/M;
    const cyMid=(stations[s].cy+stations[s+1].cy)/2, hMid=(stations[s].h+stations[s+1].h)/2;
    // cut at a constant WORLD height -> the sill is a straight line down the side
    const yAt=cyMid+hMid*seY(ang);
    if(openFrom!==undefined && xMid>openFrom && xMid<openTo && yAt>SILL_Y) continue;
    const a=s*M+i,b=s*M+(i+1)%M,c=(s+1)*M+i,d=(s+1)*M+(i+1)%M;idx.push(a,c,b,b,c,d);}
  // nose + tail caps
  const nose=stations[stations.length-1], tail=stations[0];
  const ni=verts.length/3; verts.push(nose.x+120,nose.cy,0);
  for(let i=0;i<M;i++){const b=(rings.length-1)*M+i,c=(rings.length-1)*M+(i+1)%M;idx.push(b,ni,c);}
  const ti=verts.length/3; verts.push(tail.x-100,tail.cy,0);
  for(let i=0;i<M;i++){const b=i,c=(i+1)%M;idx.push(c,ti,b);}
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  g.setIndex(idx); g.computeVertexNormals();
  const m=new THREE.Mesh(g,mat); m.castShadow=true; return m;
}
// loft ONLY the top arc (canopy glass that hugs the body silhouette)
// THE CANOPY IS THE SAME LOFT AS THE HULL (2026-07-16).
// It used to be built from its OWN station list (different widths, heights and
// centres than the body), so the glass and the fuselage were two shapes that never
// agreed — which is exactly why the frame bar "crossed over the fuselage and didn't
// look exact". Now the canopy is literally the hull surface ABOVE the sill, pushed
// out by GLASS_OUT so it lies on the skin. They cannot drift apart because they are
// the same numbers.
const GLASS_OUT=1.012;
function loftGlass(stations, mat, openFrom, openTo){
  stations=smoothStations(stations);
  const M=72, verts=[], idx=[];
  const rings=stations.map(s=>{const r=[];for(let i=0;i<M;i++){const a=Math.PI*2*i/M;
    r.push([s.x, s.cy+s.h*GLASS_OUT*seY(a), s.w*GLASS_OUT*seZ(a)]);}return r;});
  rings.forEach(r=>r.forEach(p=>verts.push(p[0],p[1],p[2])));
  for(let s=0;s<rings.length-1;s++)for(let i=0;i<M;i++){
    const xMid=(stations[s].x+stations[s+1].x)/2, ang=Math.PI*2*i/M;
    const cyMid=(stations[s].cy+stations[s+1].cy)/2, hMid=(stations[s].h+stations[s+1].h)/2;
    const yAt=cyMid+hMid*seY(ang);
    // glass = ONLY the part of the same body that sits above the sill in the opening
    if(!(xMid>openFrom && xMid<openTo && yAt>SILL_Y)) continue;
    const a=s*M+i,b=s*M+(i+1)%M,c=(s+1)*M+i,d=(s+1)*M+(i+1)%M;idx.push(a,c,b,b,c,d);}
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  g.setIndex(idx); g.computeVertexNormals();

}
// the sill line itself: where a station's surface crosses SILL_Y, per side
function sillPoints(stations, openFrom, openTo, out=1.0){
  const st=smoothStations(stations), pts=[];
  for(const s of st){
    if(s.x<=openFrom||s.x>=openTo) continue;
    if(Math.abs((SILL_Y-s.cy)/s.h)>1) continue;
    const z=halfWidthAt(s,SILL_Y)*out;
    if(z<=0) continue;
    pts.push({x:s.x, z});
  }

}
function makeLabel(t){

// ---- TWO-PROTOTYPE PROGRAM (Matt 2026-07-15) ----
// P1 = "the fat crazy one": no weight fight. Big pack, margin everywhere. Flies FIRST,
//      legally, as Experimental amateur-built (N-number, Matt's license). The learning machine.
// P2 = "the low-cost lightweight one": the Part 103 production seed, built with P1's lessons.
// SAME airframe, same X8, same bay. What changes: the pack, the structure diet, the legal lane.
const CFG = {
  // packBox height 118 (was 130): the audit caught the 14 kWh pack's floor poking 3mm
  // through the hull belly at the bay station. Same cells, slightly wider footprint.
  p1: {name:'P1 — the fat crazy one', kwh:13, packMass:58, packBox:[1090,120,400], empty:176,
       shellColor:0x525b68, pusher:true,
       lane:'Experimental amateur-built (N-number, licensed pilot)',
       note:'No weight fight. Big pack, margin everywhere, X2-style rear pusher. Proves X8 motor-out, tuning, water, foils, speed. Thrust still caps AUW ~260 kg.',
       endur:'15 min max · 15 mi · 73 mph best-range'},
  p2: {name:'P2 — the low-cost lightweight one', kwh:5, packMass:20, packBox:[430,110,380], empty:124,
       shellColor:0x5c6675, pusher:false, genset:false,
       lane:'Part 103 ultralight (no license, no registration)',
       note:'The production seed. Small swap pack + aggressive CF diet, NO pusher — just the bolt-face so one can be added. Target: under the 115.2 kg line — 124 kg as drawn, still ~9 kg to find.',
       endur:'8 min max · 6.6 mi · 60 mph best-range'},
  // P3 — the hybrid. Same airframe again. The battery bay becomes a fuel tank, and a
  // petrol engine turning a generator feeds the same 8 motors. Part 103 counts the

let COMP=null, COMPX=null, compBeat=null;
function drawOverlay(){
  if(!COMP) return;
  const w=COMP.width, h=COMP.height, x=COMPX;
  x.clearRect(0,0,w,h);
  x.drawImage(renderer.domElement,0,0,w,h);              // the 3D
  // cinematic bars + vignette
  x.fillStyle='#04070d'; x.fillRect(0,0,w,h*0.05); x.fillRect(0,h*0.95,w,h*0.05);
  const g=x.createRadialGradient(w*.5,h*.45,h*.3,w*.5,h*.45,h*.9);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(2,5,12,.7)');
  x.fillStyle=g; x.fillRect(0,0,w,h);
  const b=SHOW[showBeat]||SHOW[0];
  // brand
  x.font='700 '+Math.round(h*.017)+'px -apple-system'; x.fillStyle='rgba(220,235,255,.55)';
  x.textAlign='left'; x.fillText('SKY TRIBE · OPEN SOURCE', w*.06, h*.11);

  // MEASURE THE STATS BLOCK FIRST so the title can never run into it
  // (the title used to be drawn at a fixed size and collided with the first stat).
  const statF=Math.round(h*.05), labF=Math.round(h*.013), gap=w*.03;
  let statsW=0;
  for(const [val,lab] of b.s){
    x.font='800 '+statF+'px -apple-system'; const vw=x.measureText(val).width;
    x.font='600 '+labF+'px -apple-system'; const lw=x.measureText(lab.toUpperCase()).width;
    statsW+=Math.max(vw,lw)+gap;
  }
  const titleRoom=w*.94-statsW-w*.06-gap;   // what's actually left for the title

  // title + rule + subtitle (bottom-left), shrunk to fit the room it really has
  x.textAlign='left'; x.fillStyle='#eaf4ff';
  let tf=Math.round(h*.062);
  x.font='800 '+tf+'px -apple-system';
  while(x.measureText(b.h).width>titleRoom && tf>Math.round(h*.026)){
    tf-=2; x.font='800 '+tf+'px -apple-system';
  }
  x.shadowColor='rgba(0,0,0,.85)'; x.shadowBlur=30; x.shadowOffsetY=4;
  x.fillText(b.h, w*.06, h*.80);
  x.shadowBlur=0; x.shadowOffsetY=0;
  x.fillStyle='#7dffb0'; x.fillRect(w*.06, h*.825, w*.045, h*.006);
  // subtitle gets the full width — nothing sits beside it
  let sf=Math.round(h*.022); x.font='500 '+sf+'px -apple-system';
  while(x.measureText(b.p).width>w*.86 && sf>Math.round(h*.013)){
    sf-=1; x.font='500 '+sf+'px -apple-system';
  }
  x.fillStyle='rgba(234,244,255,.85)'; x.fillText(b.p, w*.06, h*.875);

  // stats (bottom-right)
  x.textAlign='right'; let sx=w*.94;
  for(let k=b.s.length-1;k>=0;k--){
    const val=b.s[k][0], lab=b.s[k][1];
    x.font='800 '+statF+'px -apple-system'; x.fillStyle='#7dffb0';
    x.shadowColor='rgba(0,0,0,.8)'; x.shadowBlur=22;
    x.fillText(val, sx, h*.80); x.shadowBlur=0;
    x.font='600 '+labF+'px -apple-system'; x.fillStyle='rgba(234,244,255,.72)';
    x.fillText(lab.toUpperCase(), sx, h*.835);
    x.font='800 '+statF+'px -apple-system';
    sx-=Math.max(x.measureText(val).width, x.measureText(lab.toUpperCase()).width)+gap;
  }
  // progress bar
  const TOT=SHOW.reduce((a,c)=>a+c.d,0), tt=(performance.now()/1000-showT0)%TOT;
  x.fillStyle='rgba(125,255,176,.6)'; x.fillRect(0,h*.95-3,w*(tt/TOT),3);
}

function startCanvasRecord(seconds){
  COMP=document.createElement('canvas');
  COMP.width=1600; COMP.height=Math.round(1600*innerHeight/innerWidth);
  COMPX=COMP.getContext('2d');
  const stream=COMP.captureStream(30);
  // VP8 transcodes far more reliably than VP8's canvas-stream VP9 output
  let mime='video/webm;codecs=vp8';
  if(!MediaRecorder.isTypeSupported(mime)) mime='video/webm';
  const rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:14000000});
  const chunks=[]; rec.ondataavailable=e=>{if(e.data.size)chunks.push(e.data);};
  rec.onstop=()=>{const blob=new Blob(chunks,{type:'video/webm'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='sky_tribe_presentation.webm'; a.click();
    COMP=null; document.title='REC_DONE'; };
  rec.start(); document.title='REC_RUNNING';
  setTimeout(()=>rec.stop(), seconds*1000);
}
const V3=a=>new THREE.Vector3(...a);
const ease=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
if(PRESENT){
  document.body.classList.add('present');
  controls.enabled=false; controls.autoRotate=false;
  showT0=performance.now()/1000;
  if(RECORD){ const TOT=SHOW.reduce((a,b)=>a+b.d,0);
    setTimeout(()=>startCanvasRecord(TOT+0.4), 600); }
}
// ?shot=1 — render one frame and download it as a PNG straight off the canvas.
// Beats screen-grabbing: no window juggling, no other app overlapping the shot,
// and the image is exactly what the renderer drew.
if(new URLSearchParams(location.search).get('shot')==='1'){
  setTimeout(()=>{
    renderer.render(scene,camera);
    renderer.domElement.toBlob(b=>{
      const a=document.createElement('a'); a.href=URL.createObjectURL(b);
      a.download=(new URLSearchParams(location.search).get('name')||'sky_tribe_shot')+'.png';
      a.click(); document.title='SHOT_DONE';
    },'image/png');
  }, 1500);
}
function runShow(){
  const TOT=SHOW.reduce((a,b)=>a+b.d,0);
  let t=(performance.now()/1000-showT0)%TOT, acc=0, i=0;
  for(;i<SHOW.length;i++){ if(t<acc+SHOW[i].d) break; acc+=SHOW[i].d; }
  const b=SHOW[i], lt=(t-acc)/b.d, e=ease(Math.min(1,lt));
  camera.position.copy(V3(b.cam[0]).lerp(V3(b.cam[1]), e));
  camera.lookAt(V3(b.tgt));
  document.getElementById('prog').style.width=(t/TOT*100)+'%';
  if(i!==showBeat){
    showBeat=i;
    if(b.cfg!==CUR){ CUR=b.cfg; applyConfig(); }
    const ttl=document.getElementById('ttl');
    ttl.querySelector('h1').textContent=b.h;
    ttl.querySelector('p').textContent=b.p;
    ttl.classList.remove('fade'); void ttl.offsetWidth; ttl.classList.add('fade');
    const st=document.getElementById('stats');
    st.innerHTML=b.s.map(x=>`<div class="stat"><b>${x[0]}</b><span>${x[1]}</span></div>`).join('');
    st.classList.remove('fade'); void st.offsetWidth; st.classList.add('fade');
  }
}

let sp=0;
renderer.setAnimationLoop(()=>{sp+=.3;
  if(PRESENT) runShow();
  if(COMP) drawOverlay();  // paint 3D+text into the recorded canvasfor(const b of spinBlades)b.rotation.y=b.userData.rev?-sp:sp;
  if(window._pushBlade&&C().pusher) window._pushBlade.rotation.x=sp*1.6;  // pusher spins in its own plane
  controls.update();renderer.render(scene,camera);});
</script>
